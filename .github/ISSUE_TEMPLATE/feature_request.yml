name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please search existing issues first.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who would benefit?
      placeholder: |
        I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
      placeholder: |
        A clear and concise description of your proposed solution.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where would this apply?
      options:
        - Documentation / About Product OS
        - Site theme or UI
        - Data schema (features, backlog, etc.)
        - Build / deployment
        - Search
        - Auth
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've thought about?
    validations:
      required: false
